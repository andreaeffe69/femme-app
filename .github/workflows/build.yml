name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Build APK with Docker
        uses: kivy/buildozer-action@v1
        with:
          command: buildozer android debug
          workdir: .
