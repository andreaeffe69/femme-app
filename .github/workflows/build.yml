name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool wget
          pip install buildozer cython

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          mkdir -p ~/.buildozer/android/platform
          cd ~/.buildozer/android/platform
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -o commandlinetools-linux-11076708_latest.zip
          # Crea la struttura che buildozer si aspetta
          mkdir -p android-sdk/tools/bin
          cp -r cmdline-tools/* android-sdk/tools/
          cp -r cmdline-tools/* android-sdk/cmdline-tools/latest/ 2>/dev/null || true
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          export PATH=$ANDROID_SDK_ROOT/tools/bin:$PATH
          yes | sdkmanager --licenses || true
          # Installa build-tools specifici
          sdkmanager "platform-tools" "platforms;android-31" "build-tools;30.0.3" "build-tools;33.0.0" || true
          # Crea la cartella build-tools
          mkdir -p android-sdk/build-tools/30.0.3

      - name: Configure buildozer.spec
        run: |
          echo "android.sdk_path = $HOME/.buildozer/android/platform/android-sdk" >> buildozer.spec

      - name: Build with Buildozer
        run: |
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: femme-apk
          path: bin/*.apk
