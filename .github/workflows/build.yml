name: Build APK

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool wget
          pip install buildozer cython

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          mkdir -p ~/.android
          echo "count=0" > ~/.android/repositories.cfg
          mkdir -p ~/.buildozer/android/platform
          cd ~/.buildozer/android/platform
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p android-sdk/cmdline-tools
          mv cmdline-tools android-sdk/cmdline-tools/latest
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH
          # Accetta tutte le licenze
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          # Installa i componenti necessari
          sdkmanager "platform-tools" "platforms;android-31" "build-tools;30.0.3" > /dev/null 2>&1 || true

      - name: Configure buildozer.spec
        run: |
          sed -i '/^android.sdk_path/d' buildozer.spec
          echo "android.sdk_path = $HOME/.buildozer/android/platform/android-sdk" >> buildozer.spec
          sed -i '/^android.ndk_path/d' buildozer.spec
          echo "android.ndk_path = $HOME/.buildozer/android/platform/android-ndk-r25b" >> buildozer.spec

      - name: Build with Buildozer
        run: |
          export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
          export JAVA_HOME=$JAVA_HOME_17_X64
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: femme-apk
          path: bin/*.apk
